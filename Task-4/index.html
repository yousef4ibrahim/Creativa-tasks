<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar container">
        <div class="logo">
            <span class="icon">↔</span>
            <span>InterfaceMage</span>
        </div>
        <div class="menu">☰</div>
    </nav>

    <section class="hero container">
        <h1>Dynamic <br> 3D Flip Animation</h1>
        <p>Elevate user interaction with our 3D flip animation for cards, seamlessly blending innovation and engagement into your design.</p>
    </section>

    <section class="cards container">
        <div class="card">
            <div class="card-top">
                <span class="category">SHOES</span>
                <h3>Nike ZOOM Vaporfly <br> NEXT Premium</h3>
                <p class="price">$ 254.99</p>
                <div class="img-box">
                    <img src="Image-removebg-preview.png" alt="Shoes">
                </div>
            </div>
            <div class="card-bottom">
                <p class="size-title">SELECT SIZE</p>
                <div class="sizes">
                    <span>5</span><span>6</span><span class="active">7</span><span>8</span><span>9</span>
                </div>
                <button class="add-btn">ADD TO CART</button>
            </div>
        </div>
        <button class="explore-btn">Explore more →</button>
    </section>
</body>
</html>
